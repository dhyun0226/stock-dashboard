services:
  backend:
    build: ./backend
    container_name: stock-insight-backend
    volumes:
      - ./backend/stock_insight.db:/app/stock_insight.db
      - ./backend/.env:/app/.env
    ports:
      - "8000:8000"
    restart: always

  frontend:
    image: node:20-slim
    container_name: stock-insight-frontend
    working_dir: /app
    volumes:
      - ./frontend:/app
    ports:
      - "5173:5173"
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    restart: always
